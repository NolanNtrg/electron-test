name: Build Linux

on:
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [release-ready]

env:
  LEFTHOOK: 0

permissions:
  contents: write

jobs:
  build:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Package
        run: pnpm electron-builder --linux --x64 --publish never

      - name: Upload to release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.client_payload.tag }}"
          gh release upload "$TAG" release/*.AppImage release/*.deb --clobber
