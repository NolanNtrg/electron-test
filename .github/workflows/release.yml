name: Release

on:
  push:
    branches: [main]

env:
  LEFTHOOK: 0

permissions:
  contents: write
  actions: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm electron-builder --linux --x64 --publish never
      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: |
            release/*.AppImage
            release/*.deb
          retention-days: 1

  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm electron-builder --win --x64 --publish never
      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: release/*.exe
          retention-days: 1

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm electron-builder --mac --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: release/*.dmg
          retention-days: 1

  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r .version package.json)
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="v${VERSION}-${SHORT_SHA}"
          gh release create "$TAG" \
            --prerelease \
            --title "v${VERSION} (${SHORT_SHA})" \
            --notes "Release from main at ${SHORT_SHA}" \
            artifacts/*

      - name: Delete artifacts
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X DELETE "/repos/${{ github.repository }}/actions/artifacts/${{ needs.build-linux.outputs.artifact-id }}" || true
          gh api -X DELETE "/repos/${{ github.repository }}/actions/artifacts/${{ needs.build-windows.outputs.artifact-id }}" || true
          gh api -X DELETE "/repos/${{ github.repository }}/actions/artifacts/${{ needs.build-macos.outputs.artifact-id }}" || true
