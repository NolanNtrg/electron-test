name: Release macOS

on:
  push:
    branches: [main]

env:
  LEFTHOOK: 0

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build macOS (x64)
    timeout-minutes: 30
    runs-on: macos-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm electron-builder --mac --x64 --publish never

      - id: upload
        uses: actions/upload-artifact@v4
        with:
          name: build-macos-x64
          path: release/*.dmg
          retention-days: 1

  release:
    name: Create Release (macOS)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-macos-x64
          path: artifacts

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(jq -r .version package.json)
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="v${VERSION}-${SHORT_SHA}"

          gh release create "$TAG" \
            --prerelease \
            --title "v${VERSION} (${SHORT_SHA})" \
            --notes "Release built from main — ${SHORT_SHA}" \
            2>/dev/null || true

          gh release upload "$TAG" artifacts/*.dmg --clobber

      - name: Delete artifact
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ needs.build.outputs.artifact-id }}
        run: |
          gh api -X DELETE "/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}" || true
