name: Release macOS

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ./node_modules/.bin/electron-builder --mac --x64 --publish never

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse --short=7 HEAD)
          VERSION=$(awk -F'"' '/"version"/{print $4; exit}' package.json)
          TAG="v${VERSION}-${SHA}"
          gh release create "$TAG" \
            --prerelease \
            --title "v${VERSION} (${SHA})" \
            --notes "Release built from main — ${SHA}" \
            2>/dev/null || true
          gh release upload "$TAG" release/*.dmg \
            --clobber
