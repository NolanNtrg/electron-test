name: Build macOS

on:
  pull_request:
    branches: [main]

env:
  LEFTHOOK: 0

permissions:
  contents: read

jobs:
  build:
    name: Build macOS (x64)
    timeout-minutes: 30
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm electron-builder --mac --x64 --publish never

      - name: Verify
        run: |
          ls -lh release/
          ls release/*.dmg || (echo "DMG manquant" && exit 1)
