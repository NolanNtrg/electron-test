name: Build macOS

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ./node_modules/.bin/electron-builder --mac --x64 --publish never

      - name: Verify
        run: |
          ls -lh release/
          ls release/*.dmg || (echo "DMG manquant" && exit 1)
