when:
  - event: pull_request

steps:
  - name: install
    image: node:24
    environment:
      TMPDIR: /tmp
      LEFTHOOK: "0"
    commands:
      - git config --global --add safe.directory "$CI_WORKSPACE"
      - corepack enable
      - corepack prepare pnpm@10.33.2 --activate
      - pnpm config set store-dir ~/.pnpm-store
      - pnpm install --frozen-lockfile

  - name: package
    image: electronuserland/builder:latest
    environment:
      LEFTHOOK: "0"
    commands:
      - pnpm electron-builder --win --x64 --publish never

  - name: verify
    image: alpine
    commands:
      - ls -lh release/
      - test -n "$(ls release/*.exe 2>/dev/null)" || (echo ".exe manquant" && exit 1)
