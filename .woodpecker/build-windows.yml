when:
  - event: pull_request

steps:
  - name: install
    image: node:24
    environment:
      TMPDIR: /tmp
      LEFTHOOK: "0"
    commands:
      - git config --global --add safe.directory "$CI_WORKSPACE"
      - corepack enable
      - corepack prepare pnpm@10.33.2 --activate
      - pnpm config set store-dir ~/.pnpm-store
      - pnpm install

  - name: package
    image: node:24
    environment:
      TMPDIR: /tmp
    commands:
      - git config --global --add safe.directory "$CI_WORKSPACE"
      - ./node_modules/.bin/electron-builder --win --x64 --publish never

  - name: verify
    image: alpine
    commands:
      - ls -lh release/
      - test -n "$(ls release/*.exe 2>/dev/null)" || (echo ".exe manquant" && exit 1)

  - name: release
    image: alpine:3.21
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache github-cli
      - SHA=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
      - TAG="pr-${CI_COMMIT_PULL_REQUEST}-${SHA}"
      - gh release view "$TAG" --repo NolanNtrg/electron-test 2>/dev/null || gh release create "$TAG" --repo NolanNtrg/electron-test --prerelease --title "PR #${CI_COMMIT_PULL_REQUEST} ($SHA)" --notes "Build from PR #${CI_COMMIT_PULL_REQUEST}"
      - gh release upload "$TAG" release/*.exe --repo NolanNtrg/electron-test --clobber
