when:
  - event: push
    branch: [main]

steps:
  - name: install
    image: node:24
    environment:
      TMPDIR: /tmp
      LEFTHOOK: "0"
    commands:
      - git config --global --add safe.directory "$CI_WORKSPACE"
      - corepack enable
      - corepack prepare pnpm@10.33.2 --activate
      - pnpm config set store-dir ~/.pnpm-store
      - pnpm install --frozen-lockfile

  - name: package-linux
    image: electronuserland/builder:latest
    environment:
      LEFTHOOK: "0"
    commands:
      - pnpm electron-builder --linux --x64 --publish never

  - name: package-windows
    image: electronuserland/builder:latest
    environment:
      LEFTHOOK: "0"
    commands:
      - pnpm electron-builder --win --x64 --publish never

  - name: release
    image: node:24
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - git config --global --add safe.directory "*"
      - curl -fsSL "https://github.com/cli/cli/releases/download/v2.63.0/gh_2.63.0_linux_amd64.tar.gz" | tar xz -C /tmp && install -m755 /tmp/gh_2.63.0_linux_amd64/bin/gh /usr/local/bin/gh
      - |
        cd "${CI_WORKSPACE}"
        SHA=$(git rev-parse --short=7 HEAD)
        VERSION=$(node -p "require('./package.json').version")
        TAG="v$${VERSION}-$${SHA}"
        gh release create "$${TAG}" \
          --repo NolanNtrg/electron-test \
          --prerelease \
          --title "$${TAG}" \
          --notes "Release from main at $${SHA}" \
          2>/dev/null || true
        gh release upload "$${TAG}" \
          release/*.AppImage \
          release/*.deb \
          release/*.exe \
          --repo NolanNtrg/electron-test \
          --clobber
