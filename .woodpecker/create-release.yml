when:
  - event: tag

steps:
  - name: create-release
    image: alpine
    environment:
      GH_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache github-cli jq
      - gh release view "$CI_COMMIT_TAG" --repo "$CI_REPO" >/dev/null 2>&1 || gh release create "$CI_COMMIT_TAG" --repo "$CI_REPO" --draft --prerelease --title "$CI_COMMIT_TAG" --notes ""
      - |
        jq -n --arg tag "$CI_COMMIT_TAG" \
          '{"event_type":"release-ready","client_payload":{"tag":$tag}}' \
          | gh api "repos/$CI_REPO/dispatches" --method POST --input -
